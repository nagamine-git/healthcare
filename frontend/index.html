<!doctype html>
<html lang="ja">
  <head>
    <meta charset="UTF-8" />
    <!-- maximum-scale/user-scalable: 入力フォーカス時の自動ズームを抑止 (ホーム画面PWA) -->
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover" />
    <meta name="theme-color" content="#0a0e14" />
    <!-- 計器盤の見出し・数値用フォント(オフライン時はシステムにフォールバック) -->
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@400;500;700&display=swap"
      rel="stylesheet"
    />
    <link rel="icon" type="image/svg+xml" href="/favicon.svg" />
    <link rel="apple-touch-icon" href="/apple-touch-icon.png" />
    <meta name="apple-mobile-web-app-capable" content="yes" />
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
    <meta name="apple-mobile-web-app-title" content="Ascend" />
    <title>Ascend</title>
    <!-- FOUC 回避: React 起動前に data-theme を確定する。lib/theme.ts と同じ規約。 -->
    <script>
      (function () {
        try {
          var p = localStorage.getItem("healthcare:theme") || "system";
          var actual = p === "system"
            ? (window.matchMedia("(prefers-color-scheme: light)").matches ? "light" : "dark")
            : p;
          document.documentElement.dataset.theme = actual;
          var m = document.querySelector('meta[name="theme-color"]');
          if (m) m.setAttribute("content", actual === "light" ? "#eceff3" : "#0a0e14");
        } catch (e) {
          document.documentElement.dataset.theme = "dark";
        }
      })();
    </script>
  </head>
  <body class="bg-void text-ink">
    <div id="root"></div>
    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>
