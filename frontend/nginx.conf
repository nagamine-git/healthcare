server {
  listen 80;
  server_name _;
  root /usr/share/nginx/html;
  index index.html;

  # Health Auto Export のバルクエクスポートは数十 MB に達することがある。
  client_max_body_size 100M;
  client_body_timeout 120s;
  proxy_read_timeout 120s;

  # コンテンツハッシュ付きアセットは不変 → 長期キャッシュ
  location ^~ /assets/ {
    expires 1y;
    add_header Cache-Control "public, max-age=31536000, immutable";
  }

  # Service Worker / エントリ / マニフェストは常に再検証させる。
  # これが無いと WebView が旧 SW/HTML をキャッシュし、デプロイが反映されない。
  location = /sw.js            { add_header Cache-Control "no-cache"; }
  location = /registerSW.js    { add_header Cache-Control "no-cache"; }
  location = /manifest.webmanifest { add_header Cache-Control "no-cache"; }
  location = /index.html       { add_header Cache-Control "no-cache"; }

  location / {
    try_files $uri /index.html;
    add_header Cache-Control "no-cache";
  }

  # backend / frontend / tailscale share the same network namespace
  # (network_mode: service:tailscale in docker-compose.yml), so the backend
  # is reachable on 127.0.0.1:8000.
  location ~ ^/(api|admin|healthz|ingest) {
    proxy_pass http://127.0.0.1:8000;
    proxy_set_header Host $host;
    proxy_set_header X-Real-IP $remote_addr;
    proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
    proxy_set_header X-Forwarded-Proto $scheme;
  }
}
