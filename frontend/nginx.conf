server {
  listen 80;
  server_name _;
  root /usr/share/nginx/html;
  index index.html;

  # Health Auto Export のバルクエクスポートは数十 MB に達することがある。
  client_max_body_size 100M;
  client_body_timeout 120s;
  proxy_read_timeout 120s;

  location / {
    try_files $uri /index.html;
  }

  # backend / frontend / tailscale share the same network namespace
  # (network_mode: service:tailscale in docker-compose.yml), so the backend
  # is reachable on 127.0.0.1:8000.
  location ~ ^/(api|admin|healthz|ingest) {
    proxy_pass http://127.0.0.1:8000;
    proxy_set_header Host $host;
    proxy_set_header X-Real-IP $remote_addr;
    proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
    proxy_set_header X-Forwarded-Proto $scheme;
  }
}
