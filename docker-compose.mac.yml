# macOS overlay: /dev/net/tun が無いので tailscale を userspace モードで動かす。
# 使い方: bin/up-mac.sh から
#   docker compose -f docker-compose.yml -f docker-compose.mac.yml --env-file .env.runtime up -d --build
#
# 効果:
#   - TS_USERSPACE=true (kernel TUN 不要)
#   - /dev/net/tun のバインドマウントを除去
#   - cap_add (net_admin / sys_module) を除去
#   - tailscale serve は userspace でも HTTPS 終端できる (v1.60+)
# 影響なし:
#   - TS_HOSTNAME=healthcare のまま → URL (https://healthcare.<tailnet>.ts.net) 不変
#   - HAE / openclaw 等の外部設定は変更不要

services:
  tailscale:
    environment:
      TS_AUTHKEY: ${TS_AUTHKEY:?TS_AUTHKEY is required}
      TS_HOSTNAME: ${TS_HOSTNAME:-healthcare}
      TS_STATE_DIR: /var/lib/tailscale
      TS_USERSPACE: "true"
      TS_EXTRA_ARGS: ${TS_EXTRA_ARGS:---ssh}
      TS_SERVE_CONFIG: /config/serve-config.json
    volumes: !override
      - tailscale-state:/var/lib/tailscale
      - ./tailscale:/config:ro
    cap_add: !override []
